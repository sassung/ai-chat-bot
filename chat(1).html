<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talk</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030d1b;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #05162e;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #00bfff;
            border-bottom: 1px solid #0a254a;
            letter-spacing: 1px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .user-message {
            background-color: #00bfff;
            color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: #10223d;
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .error-message {
            background-color: rgba(255, 69, 58, 0.15);
            color: #ff453a;
            border: 1px solid #ff453a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        footer {
            background-color: #05162e;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #0a254a;
        }

        input {
            flex: 1;
            background-color: #0a1d37;
            border: 1px solid #14325c;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: #00bfff;
        }

        button {
            background-color: #00bfff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        button:disabled {
            background-color: #4a5d78;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>⚡ AI TALK</header>

    <div id="chat-container">
        <div class="message bot-message">Hello! How can I help you today?</div>
    </div>

    <footer>
        <input type="text" id="user-input" placeholder="Type message..." autocomplete="off">
        <button id="send-btn">Send</button>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const messageText = userInput.value.trim();
            if (!messageText) return;

            appendMessage(messageText, 'user-message');
            userInput.value = '';

            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                // FIXED: Changed to your direct Render address so Spck Preview connects correctly
                const response = await fetch('https://onrender.com', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: messageText })
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessage(data.reply, 'bot-message');
                } else {
                    appendMessage(`⚠️ ${data.reply || 'Server error'}`, 'error-message');
                }
            } catch (error) {
                console.error(error);
                appendMessage('⚠️ Connection error. Please try again.', 'error-message');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
