<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Talk</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070d;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
padding:14px;
text-align:center;
background:#06122a;
color:#00aaff;
font-weight:bold;
border-bottom:1px solid #0a2a55;
}

/* CHAT BOX */
#chat{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

/* MESSAGES */
.msg{
padding:10px 12px;
border-radius:12px;
max-width:75%;
word-wrap:break-word;
}

.user{
align-self:flex-end;
background:linear-gradient(135deg,#0066ff,#00ccff);
}

.bot{
align-self:flex-start;
background:#0b1a33;
border:1px solid #1e3a66;
}

/* INPUT AREA */
.inputBox{
display:flex;
padding:10px;
background:#06122a;
border-top:1px solid #0a2a55;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #0a2a55;
background:#0b1a33;
color:white;
outline:none;
}

button{
margin-left:10px;
padding:12px 16px;
border:none;
border-radius:10px;
background:#00aaff;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00ccff;
}
</style>
</head>

<body>

<header>⚡ AI TALK</header>

<div id="chat"></div>

<div class="inputBox">
<input id="msg" placeholder="Type message..." />
<button onclick="send()">Send</button>
</div>

<script>
async function send() {
  let input = document.getElementById("msg");
  let text = input.value;
  let chat = document.getElementById("chat");

  if (!text) return;

  // user message
  chat.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = "";

  // loading bot
  let loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerText = "Typing...";
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    loading.innerText = data.reply;

  } catch (err) {
    loading.innerText = "⚠️ Server not connected";
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
